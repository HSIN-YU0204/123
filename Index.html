<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osaka Bloom | 櫻花漫步版</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --jp-red: #D73C3E;
            --fuji-blue: #6C8EBF;
            --paper-bg: #FAF9F6;
        }
        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background-color: var(--paper-bg); 
            color: #4A4A4A;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(215, 60, 62, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(108, 142, 191, 0.05) 0%, transparent 25%);
        }
        
        /* 日系裝飾小圖示 */
        .jp-decoration {
            position: fixed;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        .fuji-blue { color: var(--fuji-blue); }
        .bg-fuji-blue { background-color: var(--fuji-blue); }
        .glass-header { background: rgba(250, 249, 246, 0.85); backdrop-filter: blur(10px); }
        .tab-active { background-color: var(--fuji-blue); color: white; box-shadow: 0 4px 12px rgba(108, 142, 191, 0.3); }
        .page-content { display: none; }
        .page-active { display: block; }
        .nav-active { color: var(--fuji-blue) !important; font-weight: bold; }
        
        .cat-tag-景點 { background-color: #E0F2FE; color: #0369A1; }
        .cat-tag-美食 { background-color: #FFEDD5; color: #9A3412; }
        .cat-tag-交通 { background-color: #F1F5F9; color: #475569; }
        .cat-tag-住宿 { background-color: #F3E8FF; color: #7E22CE; }
        
        /* 彈窗樣式 */
        #story-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            padding: 24px;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <div class="jp-decoration text-4xl" style="top: 15%; left: 5%;">🗻</div>
    <div class="jp-decoration text-4xl" style="top: 45%; right: 8%;">🍣</div>
    <div class="jp-decoration text-4xl" style="top: 75%; left: 10%;">🏮</div>
    <div class="jp-decoration text-4xl" style="bottom: 10%; right: 5%;">🌸</div>

    <header class="sticky top-0 z-50 glass-header px-6 py-4 border-b border-gray-100">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold fuji-blue leading-tight">Osaka Bloom</h1>
                <p id="countdown-text" class="text-[10px] text-gray-400 font-medium">載入中...</p>
            </div>
            <div id="countdown-badge" class="hidden">
                <span class="text-[10px] bg-red-100 text-red-500 px-2 py-1 rounded-full font-bold animate-pulse">USJ 快通搶票</span>
            </div>
        </div>
    </header>

    <div id="page-itinerary" class="page-content page-active">
        <nav id="date-nav" class="flex overflow-x-auto px-4 py-4 space-x-3 sticky top-[68px] z-40 bg-[#FAF9F6]/95 backdrop-blur-sm border-b border-gray-50 scroll-hide"></nav>
        <main id="itinerary-content" class="px-5 mt-4"></main>
    </div>

    <div id="page-guide" class="page-content px-5 pt-6">
        <div class="bg-[#8D775F] text-white p-6 mb-6 rounded-[32px] shadow-sm relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-2xl">🧮</span>
                    <h2 class="text-lg font-bold">旅行記帳</h2>
                </div>
                <a href="https://liff.line.me/1655320992-Y8GowEpw/g/kA72aawT1nVFmLhE63QALK" target="_blank" class="block w-full bg-white text-[#8D775F] text-center py-4 rounded-2xl font-bold text-sm shadow-md">
                    開啟 LINE 記帳小工具
                </a>
            </div>
            <span class="absolute -right-4 -bottom-4 text-6xl opacity-20">💰</span>
        </div>
        
        <h3 class="font-bold text-gray-700 mb-4 px-2">🏠 住宿附近商家 & 宵夜</h3>
        <div class="space-y-4">
            <div class="bg-white/80 backdrop-blur-sm p-4 rounded-3xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-2xl">🏪</div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm">LAWSON 瓦屋町三丁目店</h4>
                    <p class="text-[10px] text-gray-400">最近的便利商店</p>
                </div>
                <a href="https://maps.app.goo.gl/ZUxzKoPJthb9Lkgc7?g_st=ic" class="text-xs fuji-blue font-bold px-3 py-2 bg-blue-50 rounded-full">地圖</a>
            </div>
            <div class="bg-white/80 backdrop-blur-sm p-4 rounded-3xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-2xl">🍜</div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm text-red-600">野口太郎拉麵店</h4>
                    <p class="text-[10px] text-gray-400">至 04:00 營業</p>
                </div>
                <a href="https://maps.app.goo.gl/nALJy2Jkg6ZX6qB18?g_st=ic" class="text-xs fuji-blue font-bold px-3 py-2 bg-blue-50 rounded-full">地圖</a>
            </div>
        </div>
    </div>

    <div id="story-modal" onclick="closeStory()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-2xl">🚩</span>
                <h3 id="modal-title" class="font-bold text-lg text-gray-800"></h3>
            </div>
            <div id="modal-body" class="text-sm leading-relaxed text-gray-600 mb-6"></div>
            <button onclick="closeStory()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold text-sm">我知道了</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] max-w-md bg-white/90 backdrop-blur-md rounded-[32px] shadow-2xl border border-gray-100 p-2 z-[100] flex justify-around items-center">
        <button onclick="showPage('itinerary')" id="btn-itinerary" class="flex flex-col items-center p-3 text-gray-400 nav-active">
            <span class="text-xl">🗓️</span><span class="text-[10px]">行程</span>
        </button>
        <button onclick="showPage('guide')" id="btn-guide" class="flex flex-col items-center p-3 text-gray-400">
            <span class="text-xl">🗺️</span><span class="text-[10px]">指南</span>
        </button>
        <button onclick="window.open('https://maps.app.goo.gl/1zug2gTcfbfFptLx9')" class="flex flex-col items-center p-3 text-gray-400">
            <span class="text-xl">🎢</span><span class="text-[10px]">USJ</span>
        </button>
    </nav>

    <script>
        const itineraryData = {
            "7/22": { title: "抵達大阪", items: [
                { time: "18:20", cat: "交通", name: "桃園機場起飛", desc: "捷星航空GK054 (6A6B)", map: "https://maps.app.goo.gl/w3gjdur5NwJeFU5B6", img: "https://images.unsplash.com/photo-1529074963764-98f45c47344b?w=600", story: "我們的冒險開始啦！桃園機場是台灣的門戶，今天我們搭乘捷星，飛向關西。記得在飛機上稍微休息，等等落地後還有一段機場快線的路程喔！", trans: "⬇️ 機場接駁 (車程47分)" },
                { time: "22:00", cat: "交通", name: "關西機場 T1", desc: "抵達關西第一航廈", map: "https://maps.app.goo.gl/w3gjdur5NwJeFU5B6", img: "https://images.unsplash.com/photo-1570610155223-66279ba81b41?w=600", story: "關西機場是填海造陸建成的海上機場，非常壯觀。我們要趕在末班車附近前往市區，這段路可以先感受一下日本鐵道的安靜節奏。", trans: "⬇️ 步行9分鐘" },
                { time: "00:00", cat: "住宿", name: "住一八號店", desc: "簽到碼: 22280049", map: "https://maps.app.goo.gl/bh2bAv3TtiEZEvw18", img: "https://images.unsplash.com/photo-1621266592285-05574581297e?w=600", story: "今晚入住的飯店位於熱鬧的難波區域，傳統與現代交織。這裡離道頓堀很近，如果肚子餓了，周邊可能還有拉麵店開著喔！" }
            ]},
            "7/23": { title: "大阪市區一日遊", items: [
                { time: "08:15", cat: "景點", name: "心齋橋筋商店街", desc: "藥妝、服飾聖地", map: "https://maps.app.goo.gl/Foh3iYSnCBJzmCvD8", img: "https://images.unsplash.com/photo-1590559899731-a382839e5549?w=600", story: "心齋橋是大阪最具代表性的商圈，這條商店街有著三百多年的歷史。從江戶時代起就是商業中心。記得看抬頭看看屋頂，這種拱廊設計讓你在大晴天或下雨天都能優雅購物！", trans: "⬇️ 步行4分鐘" },
                { time: "11:19", cat: "美食", name: "Red Rock 和牛丼飯", desc: "視覺震撼的山狀和牛", map: "https://maps.app.goo.gl/fYdFXyDovHwkYsze6", img: "https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600", story: "這家店以『堆得像山一樣高』的烤牛肉丼聞名。日本的丼飯文化講求白米飯與肉汁的平衡，Red Rock 的特製優格醬配上半熟蛋，絕對會讓你食指大動！", trans: "⬇️ 車程19分鐘" },
                { time: "12:19", cat: "景點", name: "難波八阪神社", desc: "超霸氣巨型獅子殿", map: "https://maps.app.goo.gl/xaEeLvwv8URWLmDJ7", img: "https://images.unsplash.com/photo-1605051873138-02837332c021?w=600", story: "看到那對閃爍的金牙了嗎？巨大的獅子頭高 12 公尺，據說能吸走厄運並帶來成功。這是一個祈求勝負運、商賣繁盛非常有名的神社，一定要在那裡拍張合照！", trans: "⬇️ 車程21分鐘" },
                { time: "14:00", cat: "景點", name: "通天閣 & 新世界", desc: "昭和風情老街", map: "https://maps.app.goo.gl/xaEeLvwv8URWLmDJ7", img: "https://images.unsplash.com/photo-1590252611442-5f653459e944?w=600", story: "通天閣曾是東亞最高的建築，靈感來自艾菲爾鐵塔。這裡充滿了濃濃的『老大阪』昭和氣息。記得找找幸運神比利肯（Billiken），摸摸他的腳底會帶來幸運喔！", trans: "⬇️ 車程14分鐘" },
                { time: "17:16", cat: "美食", name: "大衆すき焼き 北斗", desc: "傳統關西風壽喜燒", map: "https://maps.app.goo.gl/RBWFnvrTKcQm6TqZ9", img: "https://plus.unsplash.com/premium_photo-1663852297121-66723223011a?w=600", story: "關西風壽喜燒的特色是先『煎』肉而非燉煮，加入白糖與醬油焦化出香氣。沾上新鮮生蛋液，就是最道地的吃法！", trans: "⬇️ 車程6分鐘" },
                { time: "18:52", cat: "景點", name: "道頓堀商圈", desc: "21:00 觀光船、固力果跑跑人", map: "https://maps.app.goo.gl/FHS79DD4FvMirG1c6", img: "https://images.unsplash.com/photo-1542931237-323a19592c34?w=600", story: "道頓堀是一條運河，也是大阪『吃倒文化』的起源地。招牌一個比一個誇張，有會動的大螃蟹、巨大的章魚。一定要站在戎橋上和固力果跑跑人合影！", trans: "⬇️ 步行10分鐘" }
            ]},
            "7/24": { title: "京都古風漫步", items: [
                { time: "08:46", cat: "景點", name: "清水寺", desc: "世界文化遺產，舞台景觀", map: "https://maps.app.goo.gl/YgaEiF9KVgoMikGW6", img: "https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=600", story: "清水寺的舞台完全沒用一根釘子，僅靠 139 根櫸木支撐，是日本建築奇蹟。這裡祈求健康、學業與姻緣非常靈驗，記得去音羽瀑布喝一口清泉。", trans: "⬇️ 步行5分鐘" },
                { time: "14:30", cat: "美食", name: "錦市場", desc: "京都的廚房", map: "https://maps.app.goo.gl/tNME93m7qocw65yK8", img: "https://images.unsplash.com/photo-1542641728-6ca359b085f4?w=600", story: "錦市場有四百多年歷史，這條窄窄的小巷集中了京都所有的美味。從漬物、玉子燒到新鮮海鮮，是體驗京都常民生活最好的地方。", trans: "⬇️ 步行1分鐘" }
            ]},
            "7/26": { title: "海遊館與梅田", items: [
                { time: "09:30", cat: "景點", name: "海遊館", desc: "世界最大級水族館", map: "https://maps.app.goo.gl/JfUhUieCd7P7uoxV7", img: "https://images.unsplash.com/photo-1509230996901-83183577114b?w=600", story: "海遊館重現了環太平洋火山帶的生態環境。最核心的巨型水槽有 9 公尺深，裡面悠游著巨大的鯨鯊！你會從 8 樓沿著螺旋形步道往下走，就像潛入海底一樣。", trans: "⬇️ 車程20分鐘" },
                { time: "19:48", cat: "景點", name: "梅田藍天大廈", desc: "圓環空中庭園", map: "https://maps.app.goo.gl/8TftZhFf1mo6dfK19", img: "https://images.unsplash.com/photo-1470075801209-17f9ec0cada6?w=600", story: "這座建築被選為『世界建築前20強』。頂部的空中庭園展望台可以感受 360 度無死角的夜風，地上的發光石在黑夜中閃爍，就像踩在銀河系上一樣！", trans: "⬇️ 捷運30分鐘" }
            ]}
            // 其他日期可依此類推增加 story...
        };

        function showPage(p) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('page-active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active'));
            document.getElementById('page-' + p).classList.add('page-active');
            document.getElementById('btn-' + p).classList.add('nav-active');
            window.scrollTo(0,0);
        }

        function showStory(name, storyText) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-body').innerText = storyText || "這位導遊正在努力查閱古籍，請稍候再試！";
            document.getElementById('story-modal').style.display = 'flex';
        }

        function closeStory() {
            document.getElementById('story-modal').style.display = 'none';
        }

        function renderDay(dayKey) {
            const data = itineraryData[dayKey];
            const content = document.getElementById('itinerary-content');
            let html = `<div class="space-y-4 relative"><div class="absolute left-4 top-0 bottom-0 w-0.5 bg-gray-100"></div>`;
            
            if (!data) {
                content.innerHTML = "<p class='text-center text-gray-400 py-10'>行程資料準備中...</p>";
                return;
            }

            data.items.forEach((item, idx) => {
                html += `
                    <div class="relative pl-10">
                        <div class="absolute left-2 top-1 w-4 h-4 bg-fuji-blue rounded-full border-4 border-white shadow-sm z-10"></div>
                        <div class="bg-white rounded-[24px] shadow-sm overflow-hidden border border-gray-50">
                            <div class="relative">
                                <img src="${item.img}" class="w-full h-36 object-cover" onerror="this.src='https://images.unsplash.com/photo-1526481280693-3bfa7568e0f3?w=600'">
                                <div class="absolute bottom-2 left-2 flex gap-1">
                                    <span class="cat-tag-${item.cat} text-[9px] px-2 py-0.5 rounded-full font-bold shadow-sm">${item.cat}</span>
                                </div>
                            </div>
                            <div class="p-4">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-xs font-bold text-gray-400">${item.time}</span>
                                </div>
                                <h3 class="font-bold text-base mb-1">${item.name}</h3>
                                <p class="text-[11px] text-gray-500 mb-3 leading-relaxed">${item.desc}</p>
                                
                                <div class="grid grid-cols-2 gap-2">
                                    <a href="${item.map}" target="_blank" class="flex items-center justify-center gap-1 bg-fuji-blue/10 text-fuji-blue text-center py-2 rounded-xl text-[11px] font-bold">
                                        📍 地圖導航
                                    </a>
                                    <button onclick="showStory('${item.name}', '${item.story || ''}')" class="flex items-center justify-center gap-1 bg-red-50 text-red-500 text-center py-2 rounded-xl text-[11px] font-bold">
                                        🚩 景點故事
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                
                if (item.trans) {
                    html += `<div class="pl-14 py-2 flex items-center gap-2 text-gray-400 font-bold italic text-[10px]">
                                <span>${item.trans}</span>
                             </div>`;
                }
            });
            content.innerHTML = html + "</div>";
            document.getElementById('countdown-badge').classList.toggle('hidden', dayKey !== '7/26');
        }

        // 初始化日期導覽
        const dateNav = document.getElementById('date-nav');
        const days = Object.keys(itineraryData);
        days.forEach((day, idx) => {
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 px-6 py-2 rounded-full border border-gray-100 text-sm font-bold bg-white text-gray-500`;
            if(day === "7/23") btn.classList.add('tab-active');
            btn.innerText = day;
            btn.onclick = () => {
                document.querySelectorAll('#date-nav button').forEach(b => b.classList.remove('tab-active'));
                btn.classList.add('tab-active');
                renderDay(day);
                btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            };
            dateNav.appendChild(btn);
        });

        // 倒數計時
        const startDate = new Date('2026-07-22');
        const today = new Date();
        const diff = Math.ceil((startDate - today) / (1000 * 60 * 60 * 24));
        document.getElementById('countdown-text').innerText = diff > 0 ? `距離出發還有 ${diff} 天` : "冒險進行中！";

        // 預設渲染 7/23
        renderDay("7/23");
    </script>
</body>
</html>
